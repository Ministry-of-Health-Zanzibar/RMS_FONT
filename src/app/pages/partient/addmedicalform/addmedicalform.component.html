<div class="p-6 bg-white rounded-lg shadow-md w-[800px] mx-auto">

  <h2 class="text-lg font-semibold mb-6 text-center">
    {{ mode === 'edit' ? 'Edit Medical Board Information' : 'Add Medical Board Information' }}
  </h2>

  <form [formGroup]="medicalForm" (ngSubmit)="onSubmit()" class="space-y-4">

    <!-- Second Row -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Reason</mat-label>
      <mat-select formControlName="board_reason_id">
        <mat-option
          *ngFor="let reason of reasonList"
          [value]="reason.reason_id"
        >
          {{ reason.referral_reason_name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Board Comments -->
    <div class="grid grid-cols-1">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Board Comments</mat-label>
        <textarea matInput rows="3" formControlName="board_comments"></textarea>
      </mat-form-field>
    </div>

    <!-- Diagnoses multi-select -->
    <div class="mt-6">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Diagnosis</mat-label>
        <mat-chip-grid #chipGrid>
          <mat-chip-row
            *ngFor="let diag of selectedDiagnoses"
            [removable]="true"
            (removed)="removeDiagnosis(diag)"
          >
            {{ diag.diagnosis_name }}
            <button matChipRemove><mat-icon>close</mat-icon></button>
          </mat-chip-row>
          <input
            #diagInput
            #autoTrigger="matAutocompleteTrigger"
            placeholder="Search diagnosis..."
            [formControl]="diagnosisSearchCtrl"
            [matAutocomplete]="auto"
            [matChipInputFor]="chipGrid"
          />
        </mat-chip-grid>
        <mat-autocomplete
          #auto="matAutocomplete"
          (optionSelected)="addDiagnosis($event.option.value)"
        >
          <mat-option
            *ngFor="let diag of filteredDiagnoses"
            [value]="diag"
          >
            {{ diag.diagnosis_name }}
          </mat-option>
        </mat-autocomplete>
      </mat-form-field>
    </div>

    <!-- Upload File -->
    <div class="col-span-2 mt-3">
      <label class="block mb-2 font-medium">Upload Patient File</label>

      <input
        type="file"
        (change)="onFileSelected($event)"
        accept=".pdf,.jpg,.png,.doc,.docx"
        class="border p-2 rounded w-full"
      />

      <small class="text-gray-500">
        File must be PDF, JPG, PNG, DOC, DOCX (Max 1MB)
      </small>

      <div *ngIf="selectedFile" class="mt-1 text-green-600">
        Selected: {{ selectedFile.name }}
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end items-center gap-3 pt-4">
      <!-- Cancel Button -->
      <button
        mat-stroked-button
        type="button"
        color="warn"
        (click)="onCancel()"
        [disabled]="loading"
      >
        Cancel
      </button>

      <!-- Save Button / Spinner -->
      <button
        *ngIf="!loading"
        mat-raised-button
        color="primary"
        type="submit"
      >
        {{ mode === 'edit' ? 'Update' : 'Save' }}
      </button>

      <mat-progress-spinner
        *ngIf="loading"
        diameter="26"
        mode="indeterminate"
      >
      </mat-progress-spinner>
    </div>

  </form>

</div>
