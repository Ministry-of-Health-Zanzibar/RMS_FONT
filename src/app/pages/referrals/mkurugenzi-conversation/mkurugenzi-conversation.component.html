<h2 mat-dialog-title>Conversation</h2>

<mat-dialog-content class="h-[400px] overflow-y-auto">

  <div *ngIf="parentId" class="bg-yellow-100 p-2 rounded mb-2">
    Replying to message #{{ parentId }}
    <button mat-button color="warn" (click)="cancelReply()">Cancel</button>
  </div>

  <div *ngFor="let msg of conversations" class="mb-4">

    <!-- Sender + Date -->
    <div class="flex justify-between text-sm text-gray-600">
      <span class="font-semibold">{{ msg.sender_full_name }}</span>
      <span class="text-xs">{{ msg.date }}</span>
    </div>

    <!-- Message -->
    <div class="bg-gray-100 p-3 rounded-xl mt-1">
      {{ msg.message }}
    </div>

    <!-- Reply Button -->
    <button mat-button color="primary" (click)="setReply(msg)">Reply</button>

    <!-- Replies -->
    <div *ngIf="msg.replies?.length" class="ml-6 mt-2">
      <div *ngFor="let reply of msg.replies" class="mb-2">
        <div class="flex justify-between text-xs text-blue-600">
          <span class="font-semibold">{{ reply.sender_full_name }}</span>
          <span>{{ reply.date }}</span>
        </div>
        <div class="bg-blue-50 p-2 rounded-lg">
          {{ reply.message }}
        </div>
      </div>
    </div>

  </div>

</mat-dialog-content>

<mat-dialog-actions class="flex flex-col gap-2">

  <!-- Message -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Message</mat-label>
    <textarea matInput [(ngModel)]="message"></textarea>
  </mat-form-field>

  <!-- Send -->
  <button mat-raised-button color="primary" (click)="sendMessage()">
    Send
  </button>
</mat-dialog-actions>
