<div class="p-10 space-y-8">

  <!-- HEADER -->
  <div class="flex flex-col">
    <h1 class="text-3xl font-bold">Dashboard</h1>
  </div>

  <!-- CARDS -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <div class="p-6 bg-green-100 rounded-xl">
      <div>Total Boards</div>
      <div class="text-3xl font-bold">
        {{ referral?.data?.total_medical_boards || 0 }}
      </div>
    </div>

    <div class="p-6 bg-blue-100 rounded-xl">
      <div>Total Patients</div>
      <div class="text-3xl font-bold">
        {{ referral?.data?.total_patients || 0 }}
      </div>
    </div>

    <div class="p-6 bg-gray-100 rounded-xl">
      <div>Total Referrals</div>
      <div class="text-3xl font-bold">
        {{ referral?.data?.total_referrals || 0 }}
      </div>
    </div>

    <div class="p-6 bg-yellow-100 rounded-xl">
      <div>Hospitals</div>
      <div class="text-3xl font-bold">
        {{ referral?.data?.total_hospitals || 0 }}
      </div>
    </div>
  </div>

  <!-- PIE CHARTS -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <apx-chart
        [series]="pieSeries"
        [chart]="{ type: 'pie', height: 350 }"
        [labels]="pieLabels">
      </apx-chart>
    </div>

    <div>
      <apx-chart
        [series]="reasonSeries"
        [chart]="{ type: 'pie', height: 350 }"
        [labels]="reasonLabels">
      </apx-chart>
    </div>
  </div>

  <!-- BAR CHART -->
  <div class="bg-white p-6 rounded-lg">
    <apx-chart
      [series]="barChartOptions.series"
      [chart]="barChartOptions.chart"
      [xaxis]="barChartOptions.xaxis">
    </apx-chart>
  </div>

  <!-- LINE CHART (12 MONTH TREND) -->
  <div class="bg-white p-6 rounded-lg">
    <apx-chart
      [series]="lineChartOptions.series"
      [chart]="lineChartOptions.chart"
      [xaxis]="lineChartOptions.xaxis"
      [stroke]="lineChartOptions.stroke"
      [colors]="lineChartOptions.colors"
      [tooltip]="lineChartOptions.tooltip">
    </apx-chart>
  </div>

</div>
